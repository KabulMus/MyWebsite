<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta name="referrer" content="no-referrer">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Analyzer | Ethan Shaw</title>
    <link rel="icon" href="favicon.webp" type="image/webp">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/detector.css">
    <script src="./js/core.js" defer></script>
    <script src="./js/detector.js" defer></script>
</head>
<body>

    <header class="hero-section">
        <a href="en_US" class="back-home-btn" aria-label="Back to Home">
            <svg viewBox="0 0 24 24"><path d="M14 18l-6-6 6-6"></path></svg>
        </a>
        <section class="hero-content">
            <div>
                <h1>Audio Analyzer</h1>
                <p class="tagline">Real-time frequency & pitch monitoring (Range: C2 - C7)</p>
            </div>
        </section>
    </header>

    <main class="content-section">
        <section class="container">
            <div class="notation-toggle">
                <button class="notation-btn" onclick="analyzerApp.setNotation('sharp', this)">#</button>
                <button class="notation-btn active" onclick="analyzerApp.setNotation('natural', this)">♮</button>
                <button class="notation-btn" onclick="analyzerApp.setNotation('flat', this)">b</button>
            </div>

            <div class="card analyzer-card">
                <div id="meter">
                    <div class="center-line"></div>
                    <div id="pointer"></div>
                </div>

                <div class="current-note" id="note-display">—</div>
                
                <div class="frequency-val">
                    <span id="hz-display">0.0</span> <small>Hz</small>
                </div>

                <button id="start-btn" class="modal-btn">Start Analysis</button>
                <div class="status" id="status">Click the button and grant microphone access</div>
            </div>

            <footer>
                <p>©2026 Ethan Shaw</p>
                <p>Built with love for Charlie and you all</p>
            </footer>
        </section>
    </main>

    <!-- Language Toggle Button -->
    <a href="detector" class="lang-toggle-btn" aria-label="切换为中文">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
    </a>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg viewBox="0 0 48 48">
            <path d="M9.15039 9.15088L11.3778 11.3783" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 24H6.15" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.15039 38.8495L11.3778 36.6221" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M38.8495 38.8495L36.6221 36.6221" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M44.9996 24H41.8496" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M38.8495 9.15088L36.6221 11.3783" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 3V6.15" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 36C30.6274 36 36 30.6274 36 24C36 17.3726 30.6274 12 24 12C17.3726 12 12 17.3726 12 24C12 30.6274 17.3726 36 24 36Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M24 45.0001V41.8501" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

</body>
</html>
